[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = src
markers =
    live_llm: requires a running LM Studio instance
    live_db: requires a running MongoDB instance (deselected by default)
    live_internet: requires outbound internet access
addopts = -m "not live_db and not live_llm and not live_internet" -rA
log_cli = true
log_cli_level = INFO
