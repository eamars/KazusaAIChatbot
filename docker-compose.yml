version: "3.9"

services:
  kazusa-brain:
    build: .
    container_name: kazusa-brain
    ports:
      - "${SERVICE_PORT:-8000}:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-roleplay_bot}
      - RELEVANCE_AGENT_LLM_BASE_URL=${RELEVANCE_AGENT_LLM_BASE_URL:?required}
      - RELEVANCE_AGENT_LLM_API_KEY=${RELEVANCE_AGENT_LLM_API_KEY:?required}
      - RELEVANCE_AGENT_LLM_MODEL=${RELEVANCE_AGENT_LLM_MODEL:?required}
      - VISION_DESCRIPTOR_LLM_BASE_URL=${VISION_DESCRIPTOR_LLM_BASE_URL:?required}
      - VISION_DESCRIPTOR_LLM_API_KEY=${VISION_DESCRIPTOR_LLM_API_KEY:?required}
      - VISION_DESCRIPTOR_LLM_MODEL=${VISION_DESCRIPTOR_LLM_MODEL:?required}
      - MSG_DECONTEXTUALIZER_LLM_BASE_URL=${MSG_DECONTEXTUALIZER_LLM_BASE_URL:?required}
      - MSG_DECONTEXTUALIZER_LLM_API_KEY=${MSG_DECONTEXTUALIZER_LLM_API_KEY:?required}
      - MSG_DECONTEXTUALIZER_LLM_MODEL=${MSG_DECONTEXTUALIZER_LLM_MODEL:?required}
      - RAG_PLANNER_LLM_BASE_URL=${RAG_PLANNER_LLM_BASE_URL:?required}
      - RAG_PLANNER_LLM_API_KEY=${RAG_PLANNER_LLM_API_KEY:?required}
      - RAG_PLANNER_LLM_MODEL=${RAG_PLANNER_LLM_MODEL:?required}
      - RAG_SUBAGENT_LLM_BASE_URL=${RAG_SUBAGENT_LLM_BASE_URL:?required}
      - RAG_SUBAGENT_LLM_API_KEY=${RAG_SUBAGENT_LLM_API_KEY:?required}
      - RAG_SUBAGENT_LLM_MODEL=${RAG_SUBAGENT_LLM_MODEL:?required}
      - WEB_SEARCH_LLM_BASE_URL=${WEB_SEARCH_LLM_BASE_URL:?required}
      - WEB_SEARCH_LLM_API_KEY=${WEB_SEARCH_LLM_API_KEY:?required}
      - WEB_SEARCH_LLM_MODEL=${WEB_SEARCH_LLM_MODEL:?required}
      - COGNITION_LLM_BASE_URL=${COGNITION_LLM_BASE_URL:?required}
      - COGNITION_LLM_API_KEY=${COGNITION_LLM_API_KEY:?required}
      - COGNITION_LLM_MODEL=${COGNITION_LLM_MODEL:?required}
      - DIALOG_GENERATOR_LLM_BASE_URL=${DIALOG_GENERATOR_LLM_BASE_URL:?required}
      - DIALOG_GENERATOR_LLM_API_KEY=${DIALOG_GENERATOR_LLM_API_KEY:?required}
      - DIALOG_GENERATOR_LLM_MODEL=${DIALOG_GENERATOR_LLM_MODEL:?required}
      - DIALOG_EVALUATOR_LLM_BASE_URL=${DIALOG_EVALUATOR_LLM_BASE_URL:?required}
      - DIALOG_EVALUATOR_LLM_API_KEY=${DIALOG_EVALUATOR_LLM_API_KEY:?required}
      - DIALOG_EVALUATOR_LLM_MODEL=${DIALOG_EVALUATOR_LLM_MODEL:?required}
      - CONSOLIDATION_LLM_BASE_URL=${CONSOLIDATION_LLM_BASE_URL:?required}
      - CONSOLIDATION_LLM_API_KEY=${CONSOLIDATION_LLM_API_KEY:?required}
      - CONSOLIDATION_LLM_MODEL=${CONSOLIDATION_LLM_MODEL:?required}
      - JSON_REPAIR_LLM_BASE_URL=${JSON_REPAIR_LLM_BASE_URL:?required}
      - JSON_REPAIR_LLM_API_KEY=${JSON_REPAIR_LLM_API_KEY:?required}
      - JSON_REPAIR_LLM_MODEL=${JSON_REPAIR_LLM_MODEL:?required}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:?required}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:?required}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:?required}
      - MCP_SERVERS=${MCP_SERVERS:-{}}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  mongo:
    image: mongo:7
    container_name: kazusa-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Discord adapter (uncomment and set DISCORD_TOKEN)
  # discord-adapter:
  #   build: .
  #   container_name: kazusa-discord
  #   command: ["python", "-m", "adapters.discord_adapter", "--brain-url", "http://kazusa-brain:8000"]
  #   environment:
  #     - DISCORD_TOKEN=${DISCORD_TOKEN}
  #   depends_on:
  #     kazusa-brain:
  #       condition: service_healthy
  #   restart: unless-stopped

  # Optional: Debug adapter web UI
  # debug-adapter:
  #   build: .
  #   container_name: kazusa-debug
  #   command: ["python", "-m", "adapters.debug_adapter", "--brain-url", "http://kazusa-brain:8000", "--port", "8080"]
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     kazusa-brain:
  #       condition: service_healthy

volumes:
  mongo-data:

