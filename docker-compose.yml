version: "3.9"

services:
  kazusa-brain:
    build: .
    container_name: kazusa-brain
    ports:
      - "${SERVICE_PORT:-8000}:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-roleplay_bot}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      - LLM_API_KEY=${LLM_API_KEY:-lm-studio}
      - LLM_MODEL=${LLM_MODEL:-local-model}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-http://host.docker.internal:1234/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-model}
      - MCP_SERVERS=${MCP_SERVERS:-{}}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  mongo:
    image: mongo:7
    container_name: kazusa-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Discord adapter (uncomment and set DISCORD_TOKEN)
  # discord-adapter:
  #   build: .
  #   container_name: kazusa-discord
  #   command: ["python", "-m", "adapters.discord_adapter", "--brain-url", "http://kazusa-brain:8000"]
  #   environment:
  #     - DISCORD_TOKEN=${DISCORD_TOKEN}
  #   depends_on:
  #     kazusa-brain:
  #       condition: service_healthy
  #   restart: unless-stopped

  # Optional: Debug adapter web UI
  # debug-adapter:
  #   build: .
  #   container_name: kazusa-debug
  #   command: ["python", "-m", "adapters.debug_adapter", "--brain-url", "http://kazusa-brain:8000", "--port", "8080"]
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     kazusa-brain:
  #       condition: service_healthy

volumes:
  mongo-data:
